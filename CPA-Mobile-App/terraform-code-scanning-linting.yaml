trigger:
  branches:
    include:
      - main
  paths:
    include:
      - CPA-Mobile-App/*

pool:
  vmImage: 'ubuntu-latest'

variables:
  TF_VERSION: '1.7.5'
  TERRAFORM_DIR: 'CPA-Mobile-App'

steps:
  - checkout: self

  - script: |
      echo "Installing Terraform ${TF_VERSION}..."
      wget https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
      unzip terraform_${TF_VERSION}_linux_amd64.zip
      sudo mv terraform /usr/local/bin/
      terraform -version
    displayName: 'Install Terraform CLI'

  - script: |
      echo "Looking for *.tf files in: $(TERRAFORM_DIR)"
      find "$(TERRAFORM_DIR)" -name '*.tf'
    displayName: 'List .tf files in CPA-Mobile-App'
    continueOnError: true

  - script: |
      cd $(TERRAFORM_DIR)
      terraform init -backend=false
      terraform validate
    displayName: 'Terraform Init & Validate (only CPA-Mobile-App)'
    continueOnError: true

  - script: |
      curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
      cd $(TERRAFORM_DIR)
      tflint --init
      tflint
    displayName: 'Run tflint (only CPA-Mobile-App)'
    continueOnError: true

  - script: |
      curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
      tfsec $(TERRAFORM_DIR) --exclude azure-database-enable-audit
    displayName: 'Run tfsec (only CPA-Mobile-App)'
    continueOnError: true

  - script: |
      pip install checkov
      checkov -d $(TERRAFORM_DIR) --skip-check CKV_TF_1,CKV_TF_2,CKV2_AZURE_21,CKV_AZURE_132,CKV_AZURE_100,CKV_AZURE_140
    displayName: 'Run Checkov (only CPA-Mobile-App)'
    continueOnError: true

  - script: |
      curl -L "$(curl -s https://api.github.com/repos/tenable/terrascan/releases/latest | grep -o -E "https://.+?_Linux_x86_64.tar.gz")" > terrascan.tar.gz
      tar -xf terrascan.tar.gz terrascan && rm terrascan.tar.gz
      sudo install terrascan /usr/local/bin && rm terrascan
      terrascan version
    displayName: 'Install Terrascan'
    continueOnError: false

  - script: |
      echo "Running Terrascan on $(TERRAFORM_DIR)"
      terrascan scan -t azure -i terraform -d "$(System.DefaultWorkingDirectory)/$(TERRAFORM_DIR)" \
        --skip-rules AC_AZURE_0391,AC_AZURE_0366
    displayName: 'Terrascan - Scan only CPA-Mobile-App'
    continueOnError: false
